name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create dummy google-services.json if missing
        run: |
          if [ ! -f "app/google-services.json" ]; then
            echo '{"project_info":{"project_number":"123456789012","project_id":"dummy-project","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789012:android:0000000000000000","android_client_info":{"package_name":"com.aistudio.crickness.gullyar"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyDummyKey"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}]}' > app/google-services.json
          fi

      - name: Build Debug APK
        env:
          JAVA_OPTS: "-Djava.awt.headless=true"
        run: gradle assembleDebug -Djava.awt.headless=true -Dksp.incremental=false --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crickness-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
